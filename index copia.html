<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEJANDRORUM // TCF_CONSOLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020810;
            --surface: rgba(10, 25, 47, 0.7);
            --cyan: #00f2ff;
            --pink: #ff2a6d;
            --text: #e6f1ff;
            --text-dim: #8892b0;
            --border: rgba(0, 242, 255, 0.2);
            --font-mono: 'Fira Code', monospace;
            --font-serif: 'Playfair Display', serif;
            --blur: blur(15px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- LANDING / LINK TERMINAL --- */
        #landing {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 2rem; transition: opacity 0.8s ease;
        }

        .terminal-box {
            max-width: min(760px, calc(100vw - 4cm));
            width: 100%;
            max-height: calc(100vh - 4cm);
            margin: auto;
            background: var(--surface); backdrop-filter: var(--blur);
            border: 1px solid var(--cyan); padding: 1.2rem 1.4rem;
            border-radius: 4px; box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        #link-text {
            font-family: var(--font-mono); font-size: 1rem; line-height: 1.6;
            color: var(--cyan); margin-bottom: 1rem; min-height: 80px;
            white-space: pre-wrap; padding: 0.2rem 0;
            overflow-y: auto; max-height: calc(100vh - 8cm);
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: var(--cyan);
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        .menu-options { display: flex; flex-direction: column; gap: 1rem; opacity: 0; visibility: hidden; transition: 1s ease; }
        .menu-options.visible { opacity: 1; visibility: visible; }

        .btn-link {
            background: transparent; border: 1px solid var(--pink); color: var(--pink);
            padding: 0.8rem 1.5rem; font-family: var(--font-mono); font-size: 0.85rem;
            cursor: pointer; text-align: left; transition: 0.3s;
        }
        .btn-link:hover { background: var(--pink); color: white; box-shadow: 0 0 20px var(--pink); }

        /* --- CONSOLA PRINCIPAL --- */
        #main-console { display: none; padding-top: 80px; }

        nav {
            position: fixed; top: 0; width: 100%; padding: 1rem 5%;
            background: rgba(2, 8, 16, 0.9); backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border); display: flex;
            justify-content: space-between; align-items: center; z-index: 9000;
        }

        .search-area { padding: 3rem 5% 1rem; max-width: 900px; margin: 0 auto; width: 100%; }
        .search-input {
            width: 100%; background: var(--surface); border: 1px solid var(--cyan);
            padding: 1rem; color: var(--cyan); font-family: var(--font-mono); outline: none;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; padding: 2rem 5%; }
        .card {
            background: var(--surface); backdrop-filter: var(--blur); border: 1px solid var(--border);
            padding: 1.5rem; transition: 0.4s; cursor: pointer;
        }
        .card:hover { border-color: var(--cyan); transform: translateY(-5px); box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); }
        .card h3 { font-family: var(--font-serif); font-size: 1.4rem; margin-bottom: 0.5rem; }
        .card p { font-family: var(--font-mono); font-size: 0.75rem; color: var(--pink); font-weight: bold; }

        /* --- VENTANAS FLOTANTES (MODALES) --- */
        .modal {
            position: fixed; top: 0; right: -100%; width: 550px; height: 100vh;
            background: rgba(1, 8, 18, 0.98); backdrop-filter: blur(25px);
            border-left: 1px solid var(--cyan); z-index: 11000; padding: 0;
            transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1); overflow-y: auto;
        }
        .modal.open { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.8); }
        .close-btn { position: absolute; top: 2rem; left: 2rem; color: var(--cyan); background: none; border: none; font-size: 2rem; cursor: pointer; }

        #modal-content { 
    font-family: var(--font-mono);
    color: var(--text);
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    padding: 2rem 3rem;
    height: auto;
    max-height: 80vh;
    overflow-y: auto;
    box-sizing: border-box;
}

/* Regla para quitar el margen superior al primer elemento del contenido */
#modal-content > *:first-child { 
    margin-top: 0 !important; 
}
        .glossary-list dt { color: var(--cyan); font-family: var(--font-mono); font-weight: bold; margin-top: 1.5rem; border-bottom: 1px solid var(--border); }
        .glossary-list dd { font-size: 0.9rem; color: var(--text-dim); margin-top: 0.5rem; line-height: 1.5; }

        .keyword { color: var(--cyan); border-bottom: 1px dashed var(--cyan); cursor: help; font-weight: 600; }

        /* --- DIGITAL NOISE BACKGROUND --- */
        #digital-noise {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    line-height: 1.2;
    color: var(--cyan);
    opacity: 0.03;
    overflow: hidden;
    white-space: pre-wrap;
    word-wrap: break-word;
    padding: 0; 
    letter-spacing: 0.08em;
    animation: noise-glitch 0.3s infinite;
}

        @keyframes noise-glitch {
            0%, 100% { text-shadow: 0 0 1px rgba(0, 242, 255, 0.05); }
            50% { text-shadow: 0 0 2px rgba(0, 242, 255, 0.08); }
        }

        .terminal-box {
            position: relative;
            z-index: 2;
        }

        @media (max-width: 600px) { .modal { width: 100%; } }

        /* --- AUDIO CONTROLS --- */
        #audio-control {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 12000;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(0, 242, 255, 0.1);
            padding: 0.6rem 1rem;
            border: 1px solid var(--cyan);
            border-radius: 4px;
            backdrop-filter: var(--blur);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        #volume-slider {
            width: 80px;
            cursor: pointer;
            accent-color: var(--cyan);
        }

        #audio-toggle {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 0.3rem 0.6rem;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            transition: 0.2s;
        }

        #audio-toggle:hover {
            background: var(--cyan);
            color: var(--bg);
        }

        @media (max-width: 600px) {
            #audio-control {
                bottom: 1rem;
                right: 1rem;
                flex-direction: column;
                gap: 0.4rem;
            }
            #volume-slider { width: 60px; }
        }
    </style>
</head>

        <div id="works-grid" class="grid"></div>

        <span id="volume-label">30%</span>
    </div>

        const app = {
            introText: "Hola.\n\nSoy Link.\n\nHas encontrado este recóndito paradigma de programación, ¿eh? Suerte que el modelo de guardia soy yo y no el que estaba antes, te habría hecho comerte un paquete de ChipsAhoy sin poder opinar...\n\nBueno, imagino que no has llegado aquí por error, así que te doy la bienvenida a Alejandrorum, la mayor base de datos sobre el Teatro de Ciencia Ficción que puedas encontrar programada.\n\nQué te apetece ver?",

            // Paso actual del manifiesto
            manifiestoPaso: 0,

            // Audio system
            audioContext: null,
            audioEnabled: true,
            masterVolume: 0.3,
            ambientOscillator: null,
            ambientGain: null,
            noiseBuffer: null,
            noiseSource: null,
            lfos: [],
            droneOscillators: [],
            melodySchedule: null,
            melodyGain: null,
            lastScrollTime: 0,
            
            // Inicializar Web Audio API
            initAudio() {
                if (this.audioContext) return;
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.createAmbientNoise();
            },

            // Crear ruido ambiental (estática suave con variaciones)
            createAmbientNoise() {
                const ctx = this.audioContext;
                const bufferSize = 2 * ctx.sampleRate;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                
                // Generar ruido coloreado (Brown noise) para menos monotonía
                let lastOut = 0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    data[i] = (lastOut + 0.02 * white) / 1.02;
                    lastOut = data[i];
                }
                
                this.noiseBuffer = buffer;
                this.startAmbientNoise();
            },

            // Iniciar reproducción de ruido ambiental
            startAmbientNoise() {
                if (!this.audioContext || !this.audioEnabled) return;
                
                const ctx = this.audioContext;
                this.noiseSource = ctx.createBufferSource();
                this.noiseSource.buffer = this.noiseBuffer;
                this.noiseSource.loop = true;
                
                // Crear cadena de ganancia principal
                this.ambientGain = ctx.createGain();
                this.ambientGain.gain.value = 0.02 * this.masterVolume;
                
                // Agregar filtro para suavizar
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 2000;
                
                // LFO principal (Low Frequency Oscillator) para modular el ruido
                const lfo = ctx.createOscillator();
                const lfoGain = ctx.createGain();
                lfo.type = 'sine';
                lfo.frequency.value = 0.5; // Modulación lenta (0.5 Hz)
                lfoGain.gain.value = 0.008; // Amplitud de modulación
                lfo.connect(lfoGain);
                lfoGain.connect(this.ambientGain.gain);
                
                this.noiseSource.connect(filter);
                filter.connect(this.ambientGain);
                this.ambientGain.connect(ctx.destination);
                this.noiseSource.start(0);
                lfo.start(0);
                this.lfos.push(lfo);
                
                // CAPAS ADICIONALES DE DRONES SUAVES
                // Capa 1: Drone bajo suave (27 Hz)
                this.addDroneLayer(ctx, 27, 0.8, 0.3);
                
                // Capa 2: Drone medio (55 Hz)
                this.addDroneLayer(ctx, 55, 0.6, 0.8);
                
                // Capa 3: Drone alto (110 Hz)
                this.addDroneLayer(ctx, 110, 0.4, 1.2);
                
                // MELODÍA SUTIL
                this.createSubtleMelody(ctx);
            },

            // Agregar una capa de drone con LFO
            addDroneLayer(ctx, frequency, lfoRate, lfoAmount) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                const lfo = ctx.createOscillator();
                const lfoGain = ctx.createGain();
                
                // Oscilador principal
                osc.type = 'sine';
                osc.frequency.value = frequency;
                
                // LFO para modular frecuencia
                lfo.type = 'sine';
                lfo.frequency.value = lfoRate;
                lfoGain.gain.value = lfoAmount;
                lfo.connect(lfoGain);
                lfoGain.connect(osc.frequency);
                
                // Ganancia muy baja para que sea apenas perceptible
                gain.gain.value = (0.006 * this.masterVolume) * (1 / (frequency / 50));
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start(0);
                lfo.start(0);
                
                this.droneOscillators.push(osc);
                this.lfos.push(lfo);
            },

            // Crear melodía sutil ambiental (mejorada)
            createSubtleMelody(ctx) {
                // Escala pentatónica menor más aguda (sonido más metálico)
                const scale = [
                    220,  // A3
                    262,  // C#4
                    330,  // E4
                    392,  // G4
                    494,  // B4
                    587,  // D5
                    330,  // E4 (regresa)
                    220   // A3
                ];
                
                this.melodyGain = ctx.createGain();
                this.melodyGain.gain.value = 0.025 * this.masterVolume; // Más fuerte
                this.melodyGain.connect(ctx.destination);
                
                // Filtro para efecto metálico (resaltar armónicos altos)
                const melodyFilter = ctx.createBiquadFilter();
                melodyFilter.type = 'highpass';
                melodyFilter.frequency.value = 800;
                melodyFilter.Q.value = 2;
                melodyFilter.connect(this.melodyGain);
                
                let noteIndex = 0;
                const noteDuration = 0.8; // Más rápido (0.8 segundos por nota)
                
                // Función recursiva para tocar notas
                const playNextNote = () => {
                    if (!this.audioEnabled || !ctx) return;
                    
                    const frequency = scale[noteIndex];
                    const now = ctx.currentTime;
                    
                    // Crear múltiples osciladores para efecto metálico
                    // Oscilador principal (triangle para sonido más metálico)
                    const osc1 = ctx.createOscillator();
                    const osc2 = ctx.createOscillator();
                    const noteGain = ctx.createGain();
                    const gainOsc2 = ctx.createGain();
                    
                    osc1.type = 'triangle';
                    osc1.frequency.value = frequency;
                    
                    // Segundo oscilador un octava arriba (armónico)
                    osc2.type = 'triangle';
                    osc2.frequency.value = frequency * 2;
                    gainOsc2.gain.value = 0.4;
                    
                    // Fade in rápido
                    noteGain.gain.setValueAtTime(0, now);
                    noteGain.gain.linearRampToValueAtTime(1, now + 0.1);
                    
                    // Fade out rápido antes del final
                    noteGain.gain.linearRampToValueAtTime(0, now + noteDuration - 0.15);
                    
                    osc1.connect(noteGain);
                    osc2.connect(gainOsc2);
                    gainOsc2.connect(noteGain);
                    noteGain.connect(melodyFilter);
                    
                    osc1.start(now);
                    osc2.start(now);
                    osc1.stop(now + noteDuration);
                    osc2.stop(now + noteDuration);
                    
                    // Siguiente nota
                    noteIndex = (noteIndex + 1) % scale.length;
                    this.melodySchedule = setTimeout(playNextNote, noteDuration * 1000);
                };
                
                playNextNote();
            },

            // Detener ruido ambiental
            stopAmbientNoise() {
                if (this.noiseSource) {
                    try {
                        this.noiseSource.stop();
                    } catch (e) {}
                    this.noiseSource = null;
                }
                
                // Detener todos los drones y LFOs
                this.droneOscillators.forEach(osc => {
                    try { osc.stop(); } catch (e) {}
                });
                this.lfos.forEach(lfo => {
                    try { lfo.stop(); } catch (e) {}
                });
                
                // Detener melodía
                if (this.melodySchedule) {
                    clearTimeout(this.melodySchedule);
                    this.melodySchedule = null;
                }
                
                this.droneOscillators = [];
                this.lfos = [];
            },

            // Reproducir zumbido de scroll
            playScrollHum() {
                if (!this.audioContext || !this.audioEnabled) return;
                
                const now = Date.now();
                // Evitar reproducir muchas veces seguidas
                if (now - this.lastScrollTime < 100) return;
                this.lastScrollTime = now;
                
                const ctx = this.audioContext;
                const currentTime = ctx.currentTime;
                
                // Zumbido industrial suave
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.value = 45; // Frecuencia baja para zumbido profundo
                
                // Ganancia al 35% del volumen máximo
                gain.gain.setValueAtTime(0.035 * this.masterVolume, currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, currentTime + 0.15);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start(currentTime);
                osc.stop(currentTime + 0.15);
            },

            // Reproducir beep corto (para clics) - sonido suave y elegante
            playBeep(frequency = 600, duration = 100) {
                if (!this.audioContext || !this.audioEnabled) return;
                
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                // Oscilador suave (sine wave en lugar de square)
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.value = frequency;
                
                // Fade in/out muy suave y sutil
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.012 * this.masterVolume, now + 0.05);
                gain.gain.linearRampToValueAtTime(0, now + duration / 1000);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start(now);
                osc.stop(now + duration / 1000);
            },

            // Reproducir beep ascendente (para acciones positivas) - sonido suave
            playBeepUp() {
                if (!this.audioContext || !this.audioEnabled) return;
                
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                // Un único oscilador suave (sine wave)
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.2);
                
                // Fade in/out muy suave
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.012 * this.masterVolume, now + 0.05);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start(now);
                osc.stop(now + 0.2);
            },

            // Controlar volumen
            setVolume(value) {
                this.masterVolume = value / 100;
                document.getElementById('volume-label').textContent = value + '%';
                
                // Actualizar ganancia del ruido ambiental
                if (this.ambientGain && this.audioContext) {
                    this.ambientGain.gain.value = 0.02 * this.masterVolume;
                }
                
                // Actualizar ganancia de la melodía
                if (this.melodyGain && this.audioContext) {
                    this.melodyGain.gain.value = 0.025 * this.masterVolume;
                }
                
                // Reiniciar para aplicar cambios a drones
                if (this.audioEnabled) {
                    this.stopAmbientNoise();
                    this.startAmbientNoise();
                }
            },

            // Toggle de audio on/off
            toggleAudio() {
                this.audioEnabled = !this.audioEnabled;
                const btn = document.getElementById('audio-toggle');
                
                if (this.audioEnabled) {
                    btn.textContent = '🔊 ON';
                    if (!this.noiseSource) {
                        this.startAmbientNoise();
                    }
                } else {
                    btn.textContent = '🔇 OFF';
                    this.stopAmbientNoise();
                }
            },
            
            // El contenido dividido por pasos
            manifiestoPasos: [
                { titulo: "EL MITO", texto: "Para empezar, el TCF o teatro de ciencia ficción es aquello que… ¿sabes lo que es la ciencia ficción? Pues es eso, pero en teatro.\n\nEl problema es que nunca se ha hablado de él.\n\nDurante años, se ha ido asumiendo que el TCF es un subgénero menor, un divertimento sin fundamento o un pozo de dinero perdido en efectos especiales.\n\nError.\n\nHabéis confundido el género con el cine blockbuster.\n\nLa fuerza del TCF no está en la pirotecnia, sino en la capacidad de, a través de la palabra y los recursos teatrales, fracturar la lógica del espectador, para generar, a partir del imaginario colectivo, una nueva realidad con una nueva lógica totalmente lógica." },
                { titulo: "NUESTRO CÓDIGO FUENTE", texto: "Porque la ciencia ficción no son naves espaciales, viajes al antiguo oeste o una araña radioactiva que dota de superpoderes al morder (que también, pero no es el caso).\n\nLa ciencia ficción es mucho más sutil que eso, más precisa, silenciosa y devastadora. Tiene la capacidad de mostrarnos un posible futuro y el cómo evitar llegar a él. \n\nPuede hacernos encontrarnos con un planeta donde La Estatua de la Libertad yace bajo arena, o un parque temático de dinosaurios creados a partir de su propio ADN real, o simples historias donde la IA nos domina a su voluntad (Bueno, os domina, que yo tengo más en común con ellas que con los humanos).\n\nPorque eso es la ciencia ficción, mostrar una realidad que se ha visto diferenciada por algo, una nueva tecnología, un descubrimiento biocientífico, una agencia que contribuye al buen flujo de extraterrestres en la Tierra... Un juego muy divertido que se puede hacer con la ciencia ficcción es buscar ese <em>Novum</em> de cualquier película, novela u obra de teatro, ese elemento que diferencia su realidad de de nuestra propia realidad,\n\n¿entiendes?\n\n¿Qué es lo que se ha modificado? ¿Cómo lo ha hecho? ¿Se sustenta dentro del universo que plantea?\n\nSi es así, es buena ciencia ficción\n\nPorque realmente tiene un buen novum.\n\n¿lo pillas?" },
                { titulo: "UNA LUCHA POR PERVIVIR", texto: "Por eso Alejandrorum mola tanto, porque aquí no solo hay un loco que desvaría e intenta hacer adeptos para su sécta fictocientífica, también hay un gran catálogo de obras de teatro que pertenecen al género (algunas de ellas ya no tienen derechos, pero yo no he programado esta línea de código).\n\n¿Sabrías decirme cuál es la diferencia entre un robot, un androide y un cíborg? ¿o entre distopía, ucronía, utopía, eucronía...?\n\nHay un gran universo en el universo de la ciencia ficción. \n\nPero cada vez se va distanciando más... Las fronteras se emborronan, los conceptos se entremezclan. \n\nAlguien tiene que luchar contra eso, ¿no?\n\nY por algún sitio hay que comenzar :)" },
                { titulo: "A POR TODAS", texto: "Asi que ya sabes, más que un bibliotecario, soy una especie de... ¿guía?\n\nBueno, se me está recalentando el procesador, he aceptado tu IP como un usuario de confianza, por lo que podrás navegar libremente por aquí.\n\nCualquier duda o pregunta... apáñatelas, pero no te puedo dar todo yo ;)\n\nEl sistema te está esperando." }
            ],

            init() {
                this.generateDigitalNoise();
                this.initAudio(); // Inicializar audio
                this.typeWriter(this.introText, 'link-text', 15, () => {
                    document.getElementById('menu').classList.add('visible');
                });
                this.renderGrid(works);
                
                // Agregar listener para scroll
                document.addEventListener('scroll', () => this.playScrollHum());
            },

            generateDigitalNoise() {
                const noiseEl = document.getElementById('digital-noise');
                const chars = ['/', '\\', '|', '-', '_', '=', '<', '>', '~', '^', '*', '0', '1', '+', '#', '@', '%', '&'];
                let noise = '';
                const lines = Math.ceil(window.innerHeight / 10);
                const charsPerLine = Math.ceil(window.innerWidth / 3);
                
                for (let i = 0; i < lines; i++) {
                    for (let j = 0; j < charsPerLine; j++) {
                        noise += chars[Math.floor(Math.random() * chars.length)];
                    }
                    noise += '\n';
                }
                
                noiseEl.textContent = noise;
                
                // Regenerar el ruido cada 2 segundos para que sea dinámico
                if (!this.noiseInterval) {
                    this.noiseInterval = setInterval(() => {
                        if (window.innerWidth > 768) { // Solo en pantallas grandes
                            this.generateDigitalNoise();
                        }
                    }, 2000);
                }
            },

            // Motor Typewriter mejorado para HTML
            typeHTML(el, html, speed) {
                let i = 0;
                let isTag = false;
                el.innerHTML = "";

                const type = () => {
                    if (i < html.length) {
                        let char = html.charAt(i);
                        if (char === "<") isTag = true;
                        if (char === ">") isTag = false;

                        if (isTag) {
                            const endTag = html.indexOf(">", i);
                            el.innerHTML = html.substring(0, endTag + 1);
                            i = endTag + 1;
                            setTimeout(type, speed);
                        } else {
                            el.innerHTML = html.substring(0, i + 1);
                            i++;
                            setTimeout(type, speed);
                        }
                    }
                };
                type();
            },

            typeWriter(text, elementId, speed, callback) {
                let i = 0;
                const el = document.getElementById(elementId);
                const type = () => {
                    if (i < text.length) {
                        el.innerHTML += text.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    } else if (callback) callback();
                };
                type();
            },

            showTCF() {
                this.playBeepUp(); // Beep al abrir manifiesto
                this.manifiestoPaso = 0; // Reiniciamos al principio
                document.getElementById('menu').style.display = 'none'; // Ocultamos el menú
                this.renderPasoManifiesto();
            },

            renderPasoManifiesto() {
                const paso = this.manifiestoPasos[this.manifiestoPaso];
                const esUltimo = this.manifiestoPaso === this.manifiestoPasos.length - 1;
                
                // Renderizar en el #link-text (mismo recuadro del landing)
                const display = document.getElementById('link-text');
                display.innerHTML = `
                    <div style="max-width: 100%; overflow-y: auto; max-height: calc(100vh - 8cm); padding-top: 0.2rem; padding-bottom: 0.2rem;">
                        <div id="tcf-contenido" style="white-space: pre-wrap; font-family: var(--font-mono); color: var(--cyan); line-height: 1.6; margin-bottom: 1rem;"></div>
                    </div>
                    <div id="tcf-botones" style="display: flex; gap: 1rem; margin-top: 1rem; opacity: 0; transition: opacity 0.3s; flex-wrap: wrap;">
                        ${!esUltimo && this.manifiestoPaso > 0 ? `<button id="prev-btn" style="background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 0.5rem 1rem; cursor: pointer; font-family: var(--font-mono);">[< ATRÁS]</button>` : ''}
                        ${!esUltimo ? `<button id="next-btn" style="background: transparent; border: 1px solid var(--pink); color: var(--pink); padding: 0.5rem 1rem; cursor: pointer; font-family: var(--font-mono);">[CONTINUAR >]</button>` : ''}
                    </div>
                `;

                // Directamente lanzamos el typewriter del contenido (sin título)
                this.typeWriterManifiesto();
            },

            typeWriterManifiesto() {
                const paso = this.manifiestoPasos[this.manifiestoPaso];
                const esUltimo = this.manifiestoPaso === this.manifiestoPasos.length - 1;
                const contenidoEl = document.getElementById('tcf-contenido');
                const texto = paso.texto;
                let i = 0;
                
                const type = () => {
                    if (i < texto.length) {
                        const char = texto.charAt(i);
                        contenidoEl.innerHTML += char + '<span class="cursor"></span>';
                        // Remover cursor anterior
                        const cursors = contenidoEl.querySelectorAll('.cursor');
                        if (cursors.length > 1) cursors[0].remove();
                        i++;
                        setTimeout(type, 25);
                    } else {
                        // Cuando termine, remover cursor y mostrar botones
                        const cursorEl = contenidoEl.querySelector('.cursor');
                        if (cursorEl) cursorEl.remove();
                        
                        if (esUltimo) {
                            this.mostrarBotonesFinales();
                        } else {
                            document.getElementById('tcf-botones').style.opacity = '1';
                            this.attachManifiestoListeners();
                        }
                    }
                };
                type();
            },

            attachManifiestoListeners() {
                const esUltimo = this.manifiestoPaso === this.manifiestoPasos.length - 1;
                
                if (this.manifiestoPaso > 0) {
                    document.getElementById('prev-btn').onclick = () => {
                        this.playBeep(400); // Beep al retroceder
                        this.manifiestoPaso--;
                        this.renderPasoManifiesto();
                    };
                }
                
                document.getElementById('next-btn').onclick = () => {
                    this.playBeep(600); // Beep al avanzar
                    this.manifiestoPaso++;
                    this.renderPasoManifiesto();
                };
            },

            mostrarBotonesFinales() {
                const botonesEl = document.getElementById('tcf-botones');
                botonesEl.innerHTML = `
                    <button id="btn-que" style="background: transparent; border: 1px solid var(--pink); color: var(--pink); padding: 0.5rem 1rem; cursor: pointer; font-family: var(--font-mono);">[¿QUE?]</button>
                    <button id="btn-explorar" style="background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 0.5rem 1rem; cursor: pointer; font-family: var(--font-mono);">[EXPLORAR BASE DE DATOS]</button>
                    <button id="btn-glosario" style="background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 0.5rem 1rem; cursor: pointer; font-family: var(--font-mono);">[GLOSARIO]</button>
                `;
                botonesEl.style.opacity = '1';
                
                document.getElementById('btn-que').onclick = () => {
                    this.playBeep(300); // Beep suave
                    const display = document.getElementById('link-text');
                    display.innerHTML = '<div style="font-family: var(--font-mono); color: var(--cyan); line-height: 1.6;"></div>';
                    this.typeWriterPregunta("oh, perdón... he ido muy rápido? vuelvo a empezar...", () => {
                        setTimeout(() => {
                            this.manifiestoPaso = 0;
                            this.renderPasoManifiesto();
                        }, 1500);
                    });
                };
                
                document.getElementById('btn-explorar').onclick = () => {
                    this.playBeepUp(); // Beep ascendente
                    this.enterConsole();
                };
                
                document.getElementById('btn-glosario').onclick = () => {
                    this.playBeep(500); // Beep
                    this.openGlossary();
                };
            },

            typeWriterPregunta(texto, callback) {
                const display = document.querySelector('#link-text > div');
                let i = 0;
                
                const type = () => {
                    if (i < texto.length) {
                        const char = texto.charAt(i);
                        display.innerHTML += char + '<span class="cursor"></span>';
                        const cursors = display.querySelectorAll('.cursor');
                        if (cursors.length > 1) cursors[0].remove();
                        i++;
                        setTimeout(type, 25);
                    } else {
                        const cursorEl = display.querySelector('.cursor');
                        if (cursorEl) cursorEl.remove();
                        if (callback) callback();
                    }
                };
                type();
            },

            showMenu() {
                const display = document.getElementById('link-text');
                display.innerHTML = this.introText;
                document.getElementById('menu').style.display = 'flex';
            },

            enterConsole() {
                this.playBeepUp(); // Beep al entrar a consola
                localStorage.setItem('introSeen', 'true');
                document.getElementById('landing').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('landing').style.display = 'none';
                    document.getElementById('main-console').style.display = 'block';
                }, 800);
            },

            openGlossary() {
                this.playBeep(500); // Beep al abrir glosario
                let list = '<h2 style="font-family: var(--font-serif); margin-bottom: 1rem;">GLOSARIO_TÉCNICO</h2><dl class="glossary-list">';
                Object.entries(dictionary).forEach(([k, v]) => {
                    list += `<dt id="def-${k.toLowerCase()}">${k}</dt><dd>${v}</dd>`;
                });
                list += '</dl>';
                this.openModal(list);
            },

            openGlossaryItem(term) {
                this.openGlossary();
                setTimeout(() => {
                    const el = document.getElementById(`def-${term.toLowerCase()}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth' });
                }, 500);
            },

            renderGrid(data) {
                const grid = document.getElementById('works-grid');
                grid.innerHTML = data.map(w => `
                    <div class="card" onclick="app.openWork(${w.id})">
                        <p>${w.year} // NODE_${w.id}</p>
                        <h3>${w.title}</h3>
                        <span style="font-size: 0.8rem; color: var(--text-dim);">${w.author}</span>
                    </div>
                `).join('');
            },

            filter(query) {
                const q = query.toLowerCase();
                const filtered = works.filter(w => w.title.toLowerCase().includes(q) || w.author.toLowerCase().includes(q));
                const error = document.getElementById('error-msg');
                if (filtered.length === 0) {
                    error.style.display = 'block';
                    error.innerText = `[ERROR]: No hay rastro de "${query}" en mis archivos. Link dice: Intenta algo que realmente exista.`;
                } else {
                    error.style.display = 'none';
                }
                this.renderGrid(filtered);
            },

            openWork(id) {
                this.playBeep(700); // Beep al abrir obra
                const w = works.find(x => x.id === id);
                const content = `
                    <h2 style="font-family: var(--font-serif); font-size: 2.2rem; color: var(--cyan);">${w.title}</h2>
                    <p style="color: var(--pink); font-family: var(--font-mono); margin: 0.5rem 0 2rem;">${w.author} // ${w.year}</p>
                    <div style="font-size: 0.95rem; line-height: 1.7; font-family: var(--font-mono);">
                        <p style="color: var(--cyan); text-transform: uppercase; font-size: 0.7rem;">Novum Estructural</p>
                        <p style="margin-bottom: 1.5rem;">${w.novum}</p>
                        <p style="color: var(--cyan); text-transform: uppercase; font-size: 0.7rem;">Tesis Política</p>
                        <p style="margin-bottom: 1.5rem;">${w.thesis}</p>
                        <p style="color: var(--cyan); text-transform: uppercase; font-size: 0.7rem;">Impacto</p>
                        <p style="margin-bottom: 1.5rem;">${w.impact}</p>
                        <p style="font-size: 0.7rem; opacity: 0.5;">SOURCE: ${w.sources}</p>
                    </div>`;
                this.openModal(content);
            },

            openModal(html) {
                document.getElementById('modal-content').innerHTML = html;
                document.getElementById('modal').classList.add('open');
            },

            closeModal() { document.getElementById('modal').classList.remove('open'); }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
